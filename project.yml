name: ACVoice
options:
  bundleIdPrefix: com.crutech
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: 0.9.0

targets:
  ACVoice:
    type: application
    platform: macOS
    sources:
      - path: Whisperer
        excludes:
          - Info.plist
    info:
      path: Whisperer/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "AC Voice needs microphone access to record your voice for transcription."
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crutech.acvoice
        CODE_SIGN_ENTITLEMENTS: Whisperer/ACVoice.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: "NO"
        CODE_SIGN_STYLE: "Manual"
        PRODUCT_NAME: AC Voice
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: WhisperKit
